# SPDX-License-Identifier: MPL-2.0
# Thin wrapper around hyperpolymath/standards scorecard-reusable.yml.
# Matches the echidna sibling-repo pattern (estate-wide consolidation
# behind the standards reusables — 258 scorecard.yml deployments, 46
# unique blob SHAs, 17.8% structural drift before consolidation).
#
# The reusable encapsulates the single `analysis` job (ossf/scorecard-
# action + upload-sarif). Caller responsibilities (see
# standards/.github/workflows/scorecard-reusable.yml header):
#   - Keep `on:` triggers + `concurrency:` here (wrapper-level).
#   - Grant job-level `security-events: write` + `id-token: write`
#     (called-workflow permissions are CAPPED by the caller's block).
#   - No `secrets: inherit` required (scorecard uses GITHUB_TOKEN
#     directly), but inheriting is harmless and matches the echidna
#     wrapper convention.
name: Scorecards supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '23 4 * * 1'
  push:
    branches: [main, master]
  workflow_dispatch:

# Estate guardrail: cancel superseded runs so re-pushes / rebased PR
# updates do not pile up queued runs against the shared account-wide
# Actions concurrency pool. Safe here — read-only scan, no mutation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analysis:
    permissions:
      security-events: write
      id-token: write
    uses: hyperpolymath/standards/.github/workflows/scorecard-reusable.yml@3f34549c03274ec7a74683068f03a492b0fa805f # main as of 2026-06-01
    secrets: inherit
