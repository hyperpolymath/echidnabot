# SPDX-License-Identifier: MPL-2.0
name: ClusterFuzzLite PR fuzzing
on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  PR:
    runs-on: ubuntu-latest
    # DISABLED until gitbot-shared-context path-dep is vendored (echidnabot#67).
    # `continue-on-error` kept the workflow non-blocking but GitHub still
    # records the job's conclusion as `failure`, surfacing visual-red on
    # every PR. `if: false` skips the job entirely — required-checks
    # treat `skipped` as a pass. Remove this gate (and remove the
    # vendoring TODO referenced by #67) when the path-dep is resolved.
    if: false
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Build Fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}
