# SPDX-License-Identifier: MPL-2.0
# Thin wrapper around hyperpolymath/standards secret-scanner-reusable.yml.
# Matches the echidna sibling-repo pattern. The reusable contains the
# canonical trufflehog + gitleaks + rust-secrets (+ shell-secrets)
# bundle; routing through it force-promotes the post-Cloudflare-leak
# shell-secrets guardrail (currently MISSING in this repo's bespoke
# version) on the next sweep — direct security upgrade as a side
# effect of the structural change.
name: Secret Scanner
on:
  pull_request:
  push:
    branches: [main]
# Estate guardrail: cancel superseded runs so re-pushes / rebased PR
# updates do not pile up queued runs against the shared account-wide
# Actions concurrency pool. Safe — read-only scan, no mutation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  scan:
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: hyperpolymath/standards/.github/workflows/secret-scanner-reusable.yml@d135b05bfc647d0c0fbfedc7e80f37ea50f49236 # main as of 2026-06-01
    secrets: inherit